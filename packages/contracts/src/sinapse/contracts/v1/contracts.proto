syntax = "proto3";

package sinapse.contracts.v1;

option java_multiple_files = true;
option java_package = "com.sinapse.contracts.v1";
option csharp_namespace = "Sinapse.Contracts.V1";

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_RUNNING = 2;
  TASK_STATUS_WAITING_FOR_APPROVAL = 3;
  TASK_STATUS_COMPLETED = 4;
  TASK_STATUS_FAILED = 5;
  TASK_STATUS_CANCELED = 6;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_REQUIRED = 1;
  APPROVAL_STATUS_PENDING = 2;
  APPROVAL_STATUS_APPROVED = 3;
  APPROVAL_STATUS_REJECTED = 4;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNHEALTHY = 3;
}

enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_ASSISTANT = 2;
}

enum WorkspaceAccessMode {
  WORKSPACE_ACCESS_MODE_UNSPECIFIED = 0;
  WORKSPACE_ACCESS_MODE_READ_ONLY = 1;
  WORKSPACE_ACCESS_MODE_READ_WRITE = 2;
}

enum ModelMode {
  MODEL_MODE_UNSPECIFIED = 0;
  MODEL_MODE_GUIDED = 1;
  MODEL_MODE_MANUAL = 2;
}

enum ProviderPreference {
  PROVIDER_PREFERENCE_UNSPECIFIED = 0;
  PROVIDER_PREFERENCE_LOCAL_PREFERRED = 1;
  PROVIDER_PREFERENCE_CLOUD_PREFERRED = 2;
}

message ArtifactMetadata {
  string artifact_id = 1;
  string task_id = 2;
  string name = 3;
  string mime_type = 4;
  uint64 size_bytes = 5;
  string checksum_sha256 = 6;
  string created_at = 7;
  map<string, string> labels = 8;
}

message WorkspaceDto {
  string workspace_id = 1;
  string root_path = 2;
  string active_task_id = 3;
  string created_at = 4;
  string updated_at = 5;
}

message ServiceHealthDto {
  string service_name = 1;
  HealthStatus status = 2;
  string observed_at = 3;
  string detail = 4;
}

message SystemStatusDto {
  string environment = 1;
  HealthStatus status = 2;
  string observed_at = 3;
  string detail = 4;
}

message TaskSummaryDto {
  string task_id = 1;
  string conversation_id = 2;
  TaskStatus task_status = 3;
  ApprovalStatus approval_status = 4;
  string title = 5;
  string created_at = 6;
  string updated_at = 7;
}

enum TaskEventType {
  TASK_EVENT_TYPE_UNSPECIFIED = 0;
  TASK_EVENT_TYPE_TASK_STARTED = 1;
  TASK_EVENT_TYPE_STEP_STARTED = 2;
  TASK_EVENT_TYPE_STEP_FINISHED = 3;
  TASK_EVENT_TYPE_TASK_FINISHED = 4;
  TASK_EVENT_TYPE_TASK_FAILED = 5;
}

message TaskTimelineEvent {
  string task_id = 1;
  string step_id = 2;
  string title = 3;
  string detail = 4;
  TaskEventType event_type = 5;
  TaskStatus task_status = 6;
  string observed_at = 7;
}

message ConversationDto {
  string conversation_id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
}

message ChatMessageDto {
  string message_id = 1;
  string conversation_id = 2;
  MessageRole role = 3;
  string content = 4;
  string created_at = 5;
  string provider_id = 6;
  string model_id = 7;
}

message SearchSourceDto {
  string title = 1;
  string url = 2;
}

message SearchResultDto {
  string query = 1;
  string answer = 2;
  string provider_id = 3;
  repeated SearchSourceDto sources = 4;
}

message SearchSettingsDto {
  bool enabled = 1;
  string provider_id = 2;
  string endpoint = 3;
  string api_key_placeholder_ref = 4;
}

message SpeechSettingsDto {
  bool spoken_replies_enabled = 1;
  string stt_provider_id = 2;
  string tts_provider_id = 3;
}

message WorkspaceRootDto {
  string root_id = 1;
  string conversation_id = 2;
  string display_name = 3;
  string root_path = 4;
  WorkspaceAccessMode access_mode = 5;
  uint32 file_count = 6;
  repeated string sample_files = 7;
  string attached_at = 8;
  string last_scanned_at = 9;
}


message ProviderConfigDto {
  string provider_id = 1;
  string display_name = 2;
}

message ApiKeyEntryDto {
  string entry_id = 1;
  string provider_id = 2;
  string display_name = 3;
  string placeholder_ref = 4;
  string created_at = 5;
}

message AppSettingsDto {
  ModelMode model_mode = 1;
  ProviderPreference provider_preference = 2;
  repeated ProviderConfigDto providers = 3;
  repeated ApiKeyEntryDto api_key_entries = 4;
  string updated_at = 5;
  SearchSettingsDto search_settings = 6;
  SpeechSettingsDto speech_settings = 7;
}

message CapabilityStatusDto {
  string capability_name = 1;
  bool is_available = 2;
  string detail = 3;
}

message HealthCheckRequest {
  string requester = 1;
}

message HealthCheckResponse {
  ServiceHealthDto daemon = 1;
  ServiceHealthDto shell = 2;
  string daemon_version = 3;
  SystemStatusDto system = 4;
  repeated CapabilityStatusDto capabilities = 5;
}

message StartConversationRequest {
  string workspace_id = 1;
  string title = 2;
  string initiated_by = 3;
}

message StartConversationResponse {
  ConversationDto conversation = 1;
  string started_at = 2;
}

message SendUserMessageRequest {
  string conversation_id = 1;
  string user_message_id = 2;
  string content = 3;
  string sent_at = 4;
}

message SendUserMessageResponse {
  string daemon_message_id = 1;
  string accepted_at = 2;
  ConversationDto conversation = 3;
  ChatMessageDto user_message = 4;
  ChatMessageDto assistant_message = 5;
  SearchResultDto search_result = 6;
}

message TranscribeAudioRequest {
  bytes audio_wav = 1;
  string audio_mime_type = 2;
  string requested_by = 3;
}

message TranscribeAudioResponse {
  string transcript = 1;
  string provider_id = 2;
  string model_id = 3;
  string detail = 4;
}

message SynthesizeSpeechRequest {
  string text = 1;
  string voice_id = 2;
  string requested_by = 3;
}

message SynthesizeSpeechResponse {
  bytes audio_wav = 1;
  string audio_mime_type = 2;
  string provider_id = 3;
  string model_id = 4;
  string detail = 5;
}

message AttachWorkspaceRootRequest {
  string conversation_id = 1;
  string root_path = 2;
  string display_name = 3;
  WorkspaceAccessMode access_mode = 4;
  string requested_by = 5;
}

message AttachWorkspaceRootResponse {
  ConversationDto conversation = 1;
  WorkspaceRootDto root = 2;
}

message GetConversationWorkspaceRequest {
  string conversation_id = 1;
}

message GetConversationWorkspaceResponse {
  string conversation_id = 1;
  repeated WorkspaceRootDto roots = 2;
}


message ListConversationsRequest {
  uint32 limit = 1;
}

message ListConversationsResponse {
  repeated ConversationDto conversations = 1;
}

message GetConversationRequest {
  string conversation_id = 1;
}

message GetConversationResponse {
  ConversationDto conversation = 1;
  repeated ChatMessageDto messages = 2;
}

message StartTaskRequest {
  string conversation_id = 1;
  string title = 2;
  string requested_by = 3;
}

message StartTaskResponse {
  TaskSummaryDto task = 1;
}

message ApproveStepRequest {
  string task_id = 1;
  string step_id = 2;
  string approved_by = 3;
  string note = 4;
  string approved_at = 5;
}

message ApproveStepResponse {
  string task_id = 1;
  string step_id = 2;
  ApprovalStatus approval_status = 3;
}

message CancelTaskRequest {
  string task_id = 1;
  string reason = 2;
  string canceled_by = 3;
  string canceled_at = 4;
}

message CancelTaskResponse {
  TaskSummaryDto task = 1;
}

message ResumeTaskRequest {
  string task_id = 1;
  string resumed_by = 2;
  string resumed_at = 3;
}

message ResumeTaskResponse {
  TaskSummaryDto task = 1;
}

message ListArtifactsRequest {
  string task_id = 1;
  string conversation_id = 2;
}

message ListArtifactsResponse {
  repeated ArtifactMetadata artifacts = 1;
}


message GetAppSettingsRequest {
  string requester = 1;
}

message GetAppSettingsResponse {
  AppSettingsDto settings = 1;
}

message UpdateAppSettingsRequest {
  AppSettingsDto settings = 1;
  string updated_by = 2;
}

message UpdateAppSettingsResponse {
  AppSettingsDto settings = 1;
}

message ObserveSystemStateRequest {
  string workspace_id = 1;
  string since = 2;
}

message SystemStateEvent {
  string event_id = 1;
  string observed_at = 2;
  WorkspaceDto workspace = 3;
  repeated TaskSummaryDto tasks = 4;
  repeated ServiceHealthDto services = 5;
  repeated TaskTimelineEvent task_timeline_events = 6;
}

service DaemonContract {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetAppSettings(GetAppSettingsRequest) returns (GetAppSettingsResponse);
  rpc UpdateAppSettings(UpdateAppSettingsRequest) returns (UpdateAppSettingsResponse);
  rpc StartConversation(StartConversationRequest) returns (StartConversationResponse);
  rpc SendUserMessage(SendUserMessageRequest) returns (SendUserMessageResponse);
  rpc TranscribeAudio(TranscribeAudioRequest) returns (TranscribeAudioResponse);
  rpc SynthesizeSpeech(SynthesizeSpeechRequest) returns (SynthesizeSpeechResponse);
  rpc AttachWorkspaceRoot(AttachWorkspaceRootRequest) returns (AttachWorkspaceRootResponse);
  rpc GetConversationWorkspace(GetConversationWorkspaceRequest) returns (GetConversationWorkspaceResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc StartTask(StartTaskRequest) returns (StartTaskResponse);
  rpc ApproveStep(ApproveStepRequest) returns (ApproveStepResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc ResumeTask(ResumeTaskRequest) returns (ResumeTaskResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);
  rpc ObserveSystemState(ObserveSystemStateRequest) returns (stream SystemStateEvent);
}
